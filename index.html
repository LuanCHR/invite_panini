<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcellinha 💌</title>
<style>
  :root{
    --cream:#FFF6EF;
    --blush:#FFD9E3;
    --rose:#E8567F;
    --rose-dark:#C23B63;
    --plum:#3D2236;
    --gold:#F4B860;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    height:100%;
    font-family:'Quicksand', sans-serif;
    background:var(--cream);
    color:var(--plum);
    overflow:hidden;
  }

  @font-face{ }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
    transition:opacity .5s ease;
  }

  .hidden{
    opacity:0;
    pointer-events:none;
  }

  /* ---------- TELA 1 ---------- */

  #screen-ask{
    background:
      radial-gradient(circle at 15% 20%, var(--blush) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--blush) 0%, transparent 45%),
      var(--cream);
  }

  .question{
    font-family:'Caveat', cursive;
    font-size:clamp(2.6rem, 9vw, 5rem);
    color:var(--rose-dark);
    margin:0 0 8px 0;
    line-height:1.1;
    transform:rotate(-1.5deg);
  }

  .subtitle{
    font-size:0.95rem;
    color:#8a6c78;
    margin-bottom:46px;
    letter-spacing:.03em;
  }

  .btn-row{
    position:relative;
    width:min(420px, 90vw);
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:24px;
  }

  .btn{
    border:none;
    border-radius:999px;
    padding:16px 36px;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:1.05rem;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:transform .15s ease;
  }

  .btn:active{ transform:scale(.95); }

  .btn-yes{
    background:var(--rose);
    color:#fff;
  }

  .btn-yes:hover{ background:var(--rose-dark); }

  .btn-no{
    background:#fff;
    color:var(--plum);
    position:absolute;
    transition:top .25s ease, left .25s ease, transform .15s ease;
  }

  .yes-size-1{ font-size:1.05rem; padding:16px 36px; }
  .yes-size-2{ font-size:1.25rem; padding:20px 46px; }
  .yes-size-3{ font-size:1.5rem; padding:24px 56px; }
  .yes-size-4{ font-size:1.85rem; padding:28px 64px; }
  .yes-size-5{ font-size:2.3rem; padding:32px 74px; }

  .hint{
    margin-top:54px;
    font-size:.8rem;
    color:#b598a4;
    min-height:1.2em;
  }

  /* ---------- TELA 2 ---------- */

  #screen-yes{
    background:
      radial-gradient(circle at 50% 0%, #FFE9EE 0%, var(--cream) 60%);
  }

  .yay{
    font-family:'Caveat', cursive;
    font-size:clamp(3rem, 13vw, 6.5rem);
    color:var(--rose-dark);
    margin:0;
    animation:pop .55s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes pop{
    0%{ transform:scale(.3) rotate(-8deg); opacity:0; }
    60%{ transform:scale(1.12) rotate(3deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); }
  }

  .ask-date{
    margin-top:8px;
    font-size:1.4rem;
    font-weight:700;
    color:var(--plum);
  }

  .date-card{
    margin-top:26px;
    background:#fff;
    border-radius:24px;
    padding:22px 26px;
    box-shadow:0 14px 34px rgba(196,80,120,.18);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    width:min(320px, 86vw);
  }

  input[type="date"]{
    border:2px solid var(--blush);
    border-radius:14px;
    padding:12px 14px;
    font-family:'Quicksand', sans-serif;
    font-size:1.05rem;
    color:var(--plum);
    background:var(--cream);
    width:100%;
    text-align:center;
  }

  input[type="date"]:focus{
    outline:none;
    border-color:var(--rose);
  }

  .btn-confirm{
    background:var(--gold);
    color:var(--plum);
    border:none;
    border-radius:999px;
    padding:14px 30px;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    width:100%;
    transition:transform .15s ease, background .2s ease;
  }

  .btn-confirm:hover{ background:#f0a948; }
  .btn-confirm:active{ transform:scale(.96); }

  .confirmed{
    font-size:1rem;
    color:var(--rose-dark);
    font-weight:700;
    display:none;
  }

  @media (max-width: 480px){
    .yes-size-3{ font-size:1.3rem; padding:20px 42px; }
    .yes-size-4{ font-size:1.55rem; padding:24px 48px; }
    .yes-size-5{ font-size:1.8rem; padding:26px 52px; }
    .btn-no{ padding:14px 28px; font-size:.95rem; }
    .date-card{ padding:18px 18px; }
  }

  /* confetti */
  .confetti{
    position:fixed;
    top:-10px;
    width:10px;
    height:14px;
    opacity:.9;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:5;
  }

  @keyframes fall{
    to{ transform:translateY(110vh) rotate(540deg); opacity:.4; }
  }

  /* polaroids */
  .polaroid{
    position:fixed;
    top:-60vh;
    width:min(42vw, 190px);
    background:#fff;
    padding:10px 10px 16px 10px;
    border-radius:6px;
    box-shadow:0 18px 30px rgba(61,34,54,.25);
    z-index:6;
    transition:top 1.1s cubic-bezier(.22,.9,.3,1.35), transform 1.1s cubic-bezier(.22,.9,.3,1.35);
  }

  .polaroid img{
    display:block;
    width:100%;
    border-radius:2px;
  }
</style>
</head>
<body>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<!-- TELA 1 -->
<div class="screen" id="screen-ask">
  <p class="question">Marcellinha quer sair comigo?</p>
  <p class="subtitle">é só responder com sinceridade </p>

  <div class="btn-row">
    <button class="btn btn-yes yes-size-1" id="btn-yes">sim</button>
    <button class="btn btn-no" id="btn-no" style="position:relative;">não</button>
  </div>

  <p class="hint" id="hint"></p>
</div>

<!-- TELA 2 -->
<div class="screen hidden" id="screen-yes">
  <h1 class="yay">YUPIEEEE!</h1>
  <p class="ask-date">Quando você gostaria?</p>

  <div class="date-card">
    <input type="date" id="date-input">
    <button class="btn-confirm" id="btn-confirm">marcar esse dia</button>
    <p class="confirmed" id="confirmed-msg"></p>
  </div>
</div>

<script>
  const btnNo = document.getElementById('btn-no');
  const btnYes = document.getElementById('btn-yes');
  const btnRow = document.getElementById('btn-row') || document.querySelector('.btn-row');
  const hint = document.getElementById('hint');

  const noPhrases = ["não", "tem certeza?", "pensa bem...", "hein?", "é sério isso?", "última chance", "não vale 🫩"];
  let noClicks = 0;

  function moveNoButton(){
    const rowRect = btnRow.getBoundingClientRect();
    const btnRect = btnNo.getBoundingClientRect();

    const maxX = rowRect.width - btnRect.width;
    const maxY = rowRect.height - btnRect.height;

    // se a área é pequena (mobile), usa a tela toda
    const useWindow = maxX < 40 || maxY < 40;

    let x, y;
    if(useWindow){
      const margin = 16;
      x = Math.random() * (window.innerWidth - btnRect.width - margin*2) + margin - rowRect.left;
      y = Math.random() * (window.innerHeight - btnRect.height - margin*2) + margin - rowRect.top;
      btnNo.style.position = 'fixed';
      btnNo.style.left = (x + rowRect.left) + 'px';
      btnNo.style.top = (y + rowRect.top) + 'px';
    } else {
      x = Math.random() * maxX;
      y = Math.random() * maxY;
      btnNo.style.position = 'absolute';
      btnNo.style.left = x + 'px';
      btnNo.style.top = y + 'px';
    }
  }

  let lastDodge = 0;
  function dodgeOnce(){
    const now = Date.now();
    if(now - lastDodge < 250) return;
    lastDodge = now;
    dodge();
  }

  btnNo.addEventListener('mouseenter', dodgeOnce);
  btnNo.addEventListener('click', (e) => { e.preventDefault(); dodgeOnce(); });
  btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); dodgeOnce(); }, {passive:false});

  function dodge(){
    noClicks++;
    moveNoButton();
    btnNo.textContent = noPhrases[Math.min(noClicks, noPhrases.length - 1)];

    const sizeClass = 'yes-size-' + Math.min(noClicks + 1, 5);
    btnYes.className = 'btn btn-yes ' + sizeClass;

    const hints = [
      "",
      "ele não quer ser clicado",
      "ele tá fugindo de verdade",
      "desiste, tenta o sim 💗",
      "olha o tamanho do sim já...",
      "só tem um botão que funciona aqui"
    ];
    hint.textContent = hints[Math.min(noClicks, hints.length - 1)];
  }

  btnYes.addEventListener('click', () => {
    document.getElementById('screen-ask').classList.add('hidden');
    document.getElementById('screen-yes').classList.remove('hidden');
    burstConfetti();
  });

  // confetti
  function burstConfetti(){
    const colors = ['#E8567F', '#F4B860', '#FFD9E3', '#C23B63', '#fff'];
    const spots = [
      {x: '5%'}, {x: '95%'}, {x: '25%'}, {x: '75%'}, {x: '50%'}
    ];

    for(let burst = 0; burst < 3; burst++){
      setTimeout(() => {
        spots.forEach(spot => {
          for(let i=0; i<10; i++){
            createConfetti(spot.x, colors[Math.floor(Math.random()*colors.length)]);
          }
        });
      }, burst * 350);
    }
  }

  function createConfetti(xPos, color){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = `calc(${xPos} + ${(Math.random()*60 - 30)}px)`;
    el.style.background = color;
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const duration = 2.2 + Math.random()*1.6;
    el.style.animationDuration = duration + 's';
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000 + 100);
  }

    photos.forEach((p, i) => {
      setTimeout(() => {
        const wrap = document.createElement('div');
        wrap.className = 'polaroid';
        wrap.style.left = p.left;
        wrap.style.transform = `rotate(${p.rot}deg)`;

        const img = document.createElement('img');
        img.src = p.src;
        wrap.appendChild(img);

        document.body.appendChild(wrap);

        requestAnimationFrame(() => {
          wrap.style.top = p.finalTop;
        });
      }, i * 350);
    });
  }

  document.getElementById('btn-confirm').addEventListener('click', () => {
    const val = document.getElementById('date-input').value;
    const msg = document.getElementById('confirmed-msg');
    if(!val){
      msg.style.display = 'block';
      msg.style.color = '#C23B63';
      msg.textContent = 'escolhe uma data primeiro 🥹';
      return;
    }
    const [y,m,d] = val.split('-');
    const dateObj = new Date(y, m-1, d);
    const formatted = dateObj.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    msg.style.display = 'block';
    msg.style.color = '#C23B63';
    msg.textContent = 'combinado cabeçuda, ' + formatted + '! 💕';
    burstConfetti();
    dropPhotos();
  });
